name: Model retrain

# The models improve because the data grows underneath them: every IPO that matures
# adds a 6m/12m/24m label, and every IPO the daily job enriches adds features. This
# harvests that weekly.
#
# A retrain is NOT assumed to be an improvement. Cross-validation is forward in time
# (train on IPOs that listed before the ones being scored), and every model head must
# beat its own mean/majority baseline by more than the noise, win a majority of folds,
# and remove >=3% of that baseline's error — otherwise it is not shipped at all. So a
# run that promotes nothing, or that drops a forecast the site used to show, is the
# system working. Every attempt is recorded in data/model_history.json.

on:
  schedule:
    - cron: "0 4 * * 0"      # Sundays 09:30 IST, after the daily data refresh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ipo-radar          # never race the daily data job
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet -r automation/requirements.txt

      - name: Retrain (promote only if it beats the incumbent)
        run: python automation/retrain.py

      - name: Commit promoted models
        run: |
          git config user.name "ipo-radar-bot"
          git config user.email "actions@github.com"
          # stage the artifacts first: whether THEY changed is what "promoted" means.
          # model_history.json always changes (it records the attempt), so staging it
          # together would make every run look like a promotion.
          git add backend/app/horizon_model.pkl backend/app/listing_model_signals.json
          if git diff --cached --quiet; then
            MSG="model: retrain $(date -u +%F) — no promotion, incumbent still best"
            echo "::notice::no model beat the incumbent; artifacts unchanged"
          else
            MSG="model: retrain $(date -u +%F) — promoted"
          fi
          git add data/model_history.json
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "$MSG"
            git push
          fi
