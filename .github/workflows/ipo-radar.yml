name: IPO radar daily update

on:
  schedule:
    - cron: "30 2 * * *"     # 08:00 IST daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ipo-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r automation/requirements.txt

      - name: Run update pipeline
        run: python automation/update.py

      - name: Commit refreshed data
        run: |
          git config user.name "ipo-radar-bot"
          git config user.email "actions@github.com"
          git add data docs/data ipodata/finalipodata_expanded_20yr.xlsx
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            git push
          fi
